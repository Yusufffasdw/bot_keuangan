<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro-Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #080a0f;
    --surface: #11141d;
    --card: #1a1f2e;
    --border: rgba(255, 255, 255, 0.08);
    --green: #00f298;
    --red: #ff4d6d;
    --blue: #3a8dff;
    --yellow: #ffc107;
    --text: #f0f2f5;
    --muted: #8b949e;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
    --grad-green: linear-gradient(135deg, #00f298 0%, #07a3d0 100%);
    --grad-red: linear-gradient(135deg, #ff4d6d 0%, #ff8a00 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% 0%, #1a1f3d 0%, var(--bg) 70%);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── ANIMATIONS ── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGlow {
    0% { box-shadow: 0 0 5px var(--green); }
    50% { box-shadow: 0 0 20px var(--green); }
    100% { box-shadow: 0 0 5px var(--green); }
  }

  /* ── HEADER ── */
  header {
    background: rgba(17, 20, 29, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.2rem;
    font-weight: 700;
    background: linear-gradient(to right, #fff, var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-dot { 
    width: 12px; height: 12px; border-radius: 50%; 
    background: var(--green); 
    animation: pulseGlow 2s infinite; 
  }

  .api-config input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    padding: 10px 15px;
    border-radius: 12px;
    width: 320px;
    transition: all 0.3s;
  }

  .api-config input:focus {
    border-color: var(--blue);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 0 4px rgba(58, 141, 255, 0.1);
  }

  .btn-refresh {
    background: var(--grad-green);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-refresh:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 242, 152, 0.3);
  }

  /* ── MAIN ── */
  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

  /* ── CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 1.8rem;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: slideUp 0.5s ease backwards;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .card-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .card-value {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 600;
  }

  .card.green .card-value { color: var(--green); }
  .card.red .card-value { color: var(--red); }

  /* ── GLASS PANEL ── */
  .panel {
    background: rgba(26, 31, 46, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    animation: slideUp 0.6s ease 0.2s backwards;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 20px;
    margin-bottom: 2rem;
  }

  /* ── TABLE ── */
  .tx-table tr { transition: background 0.2s; }
  .tx-table tr:hover { background: rgba(255, 255, 255, 0.03); }

  .badge {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 10px;
    text-transform: uppercase;
  }

  .badge-in { background: rgba(0, 242, 152, 0.1); color: var(--green); border: 1px solid rgba(0, 242, 152, 0.2); }
  .badge-out { background: rgba(255, 77, 109, 0.1); color: var(--red); border: 1px solid rgba(255, 77, 109, 0.2); }

  /* ── LOADING BAR ── */
  #status-bar {
    margin-bottom: 20px;
    font-size: 13px;
    padding: 10px;
    border-radius: 10px;
    display: inline-block;
  }
  .status-ok { background: rgba(0, 242, 152, 0.1); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span>FINANCE.OS</span>
  </div>
  <div class="api-config">
    <input type="text" id="api-url" placeholder="Backend URL (Railway/Render)" />
    <button class="btn-refresh" onclick="loadData()">REFRESH</button>
  </div>
</header>

<main>
  <div id="status-bar">Waiting for API connection...</div>

  <div class="cards">
    <div class="card green" style="animation-delay: 0.1s">
      <div class="card-label">Income</div>
      <div class="card-value" id="c-masuk">Rp 0</div>
    </div>
    <div class="card red" style="animation-delay: 0.2s">
      <div class="card-label">Expense</div>
      <div class="card-value" id="c-keluar">Rp 0</div>
    </div>
    <div class="card blue" style="animation-delay: 0.3s">
      <div class="card-label">Balance</div>
      <div class="card-value" id="c-saldo">Rp 0</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="card-label" style="margin-bottom: 20px;">Cashflow Trend</div>
      <div style="height: 300px;">
        <canvas id="barChart"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="card-label" style="margin-bottom: 20px;">Allocation</div>
      <div style="height: 200px;">
        <canvas id="donutChart"></canvas>
      </div>
      <div id="donut-legend" style="margin-top: 20px;"></div>
    </div>
  </div>

  <div class="panel">
    <div class="card-label" style="margin-bottom: 20px;">Recent Activity</div>
    <div id="tx-container">
      <div style="text-align: center; padding: 40px; color: var(--muted);">No transactions found.</div>
    </div>
  </div>
</main>

<script>
  Chart.defaults.color = '#8b949e';
  Chart.defaults.font.family = "'Sora', sans-serif";

  const fmt = n => 'Rp ' + Math.round(Math.abs(n)).toLocaleString('id-ID');
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  let charts = {};

  async function loadData() {
    const rawUrl = document.getElementById('api-url').value.trim();
    if (!rawUrl) return;
    
    const url = rawUrl.replace(/\/$/, '') + '/api/transactions';
    const statusEl = document.getElementById('status-bar');
    
    try {
      statusEl.textContent = "⚡ Syncing data...";
      const res = await fetch(url);
      const data = await res.json();
      
      updateUI(data);
      statusEl.className = "status-ok";
      statusEl.textContent = "● Systems Active - " + new Date().toLocaleTimeString();
    } catch (e) {
      statusEl.textContent = "❌ Connection Failed";
      statusEl.className = "error";
    }
  }

  function updateUI(data) {
    // 1. Update Cards (Pemasukan, Pengeluaran, Saldo)
    animateValue("c-masuk", data.summary.pemasukan, 800);
    animateValue("c-keluar", data.summary.pengeluaran, 800);
    animateValue("c-saldo", data.summary.saldo, 800);

    // 2. Render Grafik Batang (Data Harian)
    renderBarChart(data.transactions);
    
    // 3. Render Donut (Komposisi)
    renderDonutChart(data.summary);

    // 4. Update Tabel
    renderTable(data.transactions);
  }

  function renderBarChart(txs) {
    const ctx = document.getElementById('barChart').getContext('2d');
    
    // Kelompokkan data 7 hari terakhir secara otomatis
    const days = {};
    const now = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      days[key] = { masuk: 0, keluar: 0 };
    }

    txs.forEach(t => {
      const key = t.date.split('T')[0];
      if (days[key]) {
        if (t.type === 'pemasukan') days[key].masuk += t.amount;
        else days[key].keluar += t.amount;
      }
    });

    const labels = Object.keys(days).map(k => {
      const d = new Date(k + 'T00:00');
      return d.getDate() + ' ' + months[d.getMonth()];
    });

    if (charts.bar) charts.bar.destroy();
    charts.bar = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Masuk', data: Object.values(days).map(d => d.masuk), backgroundColor: '#00f298', borderRadius: 6 },
          { label: 'Keluar', data: Object.values(days).map(d => d.keluar), backgroundColor: '#ff4d6d', borderRadius: 6 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => v >= 1e3 ? (v/1e3) + 'rb' : v } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderDonutChart(s) {
    const ctx = document.getElementById('donutChart').getContext('2d');
    if (charts.donut) charts.donut.destroy();
    
    charts.donut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Pemasukan', 'Pengeluaran'],
        datasets: [{
          data: [s.pemasukan, s.pengeluaran],
          backgroundColor: ['#00f298', '#ff4d6d'],
          borderWidth: 0,
          hoverOffset: 10
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '75%',
        plugins: { legend: { display: false } }
      }
    });
  }

  function animateValue(id, end, duration) {
    const obj = document.getElementById(id);
    const start = parseInt(obj.innerText.replace(/[^0-9-]/g, '')) || 0;
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const val = Math.floor(progress * (end - start) + start);
      obj.innerHTML = fmt(val);
      if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
  }

  function renderTable(txs) {
    const container = document.getElementById('tx-container');
    if (!txs.length) return;
    
    const rows = txs.slice(0, 10).map((t, i) => `
      <tr style="animation: slideUp 0.4s ease ${i*0.05}s backwards">
        <td style="padding: 12px 0;"><span class="badge ${t.type === 'pemasukan' ? 'badge-in' : 'badge-out'}">${t.type}</span></td>
        <td style="font-size: 13px;">${t.keterangan}</td>
        <td style="font-family: var(--mono); font-weight: 500; color: ${t.type === 'pemasukan' ? 'var(--green)' : 'var(--red)'}">
          ${t.type === 'pemasukan' ? '+' : '-'}${fmt(t.amount)}
        </td>
      </tr>
    `).join('');
    
    container.innerHTML = `<table style="width: 100%; border-collapse: collapse;">${rows}</table>`;
  }

  // Load URL tersimpan
  const saved = localStorage.getItem('keuangan_api_url');
  if (saved) {
    document.getElementById('api-url').value = saved;
    loadData();
  }

  document.getElementById('api-url').addEventListener('change', (e) => {
    localStorage.setItem('keuangan_api_url', e.target.value.trim());
  });

  setInterval(() => { if(document.getElementById('api-url').value) loadData() }, 10000);
</script>
</body>
</html>
